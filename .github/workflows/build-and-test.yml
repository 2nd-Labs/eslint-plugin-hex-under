name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package*.json"
      - ".github/workflows/**"
      - "test/**"
      - "fixture/**"
      - "*.config.js"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package*.json"
      - ".github/workflows/**"
      - "test/**"
      - "fixture/**"
      - "*.config.js"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security check
        run: npm audit --audit-level=high
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: DEBUG=eslint:eslint npm run lint -- --ignore-pattern 'fixture/*'

  test:
    name: Testing
    needs:
      - audit
      - lint
    strategy:
      fail-fast: true
      matrix:
        node-version: [22, 24, 25]
        os: [ubuntu-latest]
        include:
          - os: ubuntu-24.04-arm
            node-version: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test

  bats:
    name: Bats Tests
    needs:
      - audit
      - lint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:bats
